services:
  - type: worker
    name: auto-recruiter-combined
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python combined_launcher.py
    envVars:
      - fromGroup: auto-recruiter-secrets
      - key: STATE_DIR
        value: /data
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 7
